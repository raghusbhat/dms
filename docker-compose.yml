# --------------------------------------------------------------------
# DMS — Local Development Infrastructure
#
# Starts: PostgreSQL (pgvector), Redis, MinIO, Meilisearch, Mailhog
# Does NOT start the backend or frontend — run those separately.
#
# Usage:
#   docker compose up -d          (start all)
#   docker compose down           (stop all, keep data)
#   docker compose down -v        (stop all + delete all data)
# --------------------------------------------------------------------

services:
  # ------------------------------------------------------------------
  # PostgreSQL — main database (pgvector enabled for Phase 7)
  # Port 5433 to avoid conflict with local_postgres (SmartEye) on 5432
  # ------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dms
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # Redis — background job queue (Celery broker + backend)
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: dms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # MinIO — S3-compatible local file storage
  # Console: http://localhost:9003  (user: minioadmin / minioadmin)
  # API:     http://localhost:9002
  # (Ports 9000/9001 are taken by SmartEye MinIO)
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: dms_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ------------------------------------------------------------------
  # Meilisearch — full-text search
  # Dashboard: http://localhost:7700
  # ------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: dms_meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: "dev-master-key-change-in-production"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  # ------------------------------------------------------------------
  # Mailhog — local email testing (catches all outgoing email)
  # Web UI: http://localhost:8025
  # SMTP:   localhost:1025
  # ------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: dms_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
